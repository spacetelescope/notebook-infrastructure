name: Cross-Repo Notebook CI Metrics v2

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Switch to metrics branch
        run: |
          git fetch origin metrics || true
          git checkout -B metrics origin/metrics || git checkout -B metrics

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Ensure metrics directory exists
        run: mkdir -p metrics

      - name: Generate report, history, and dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: Notebook CI - Scheduled
        run: |
          python .github/scripts/scheduled_ci_report.py \
            .github/repos.txt \
            metrics/report.md \
            metrics/history.json \
            metrics/dashboard.md

      - name: Write report to workflow summary
        run: cat metrics/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push metrics branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add metrics/history.json metrics/dashboard.md metrics/report.md
          git diff --cached --quiet || git commit -m "Update notebook CI metrics"
          git push origin metrics

      - name: Check out gh-pages branch into subfolder
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-site

      - name: Publish only /metrics to gh-pages
        run: |
          mkdir -p gh-pages-site/metrics
      
          rsync -a \
            --exclude history.json \
            --exclude report.md \
            --exclude dashboard.md \
            metrics/ gh-pages-site/metrics/
      
          cp metrics/history.json gh-pages-site/metrics/history.json
          cp metrics/report.md gh-pages-site/metrics/report.md
          cp metrics/dashboard.md gh-pages-site/metrics/dashboard.md
      
          touch gh-pages-site/.nojekyll
      
          cd gh-pages-site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          git add .nojekyll metrics/
      
          if git diff --cached --quiet; then
            echo "No gh-pages changes to commit"
          else
            git commit -m "Update metrics dashboard"
            git push origin gh-pages
          fi
