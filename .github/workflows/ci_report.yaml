name: Cross-Repo Notebook CI Failure Report

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Write repositories list
        run: |
          cat <<'EOF' > repos.txt
          spacetelescope/hellouniverse
          spacetelescope/mast_notebooks
          spacetelescope/jdat_notebooks
          spacetelescope/hst_notebooks
          spacetelescope/roman_notebooks
          EOF

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/cross_repo_ci_report.py repos.txt report.md

      - name: Write report to summary
        run: cat report.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: cross-repo-ci-report
          path: report.md
          retention-days: 90
