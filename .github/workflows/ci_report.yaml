name: Cross-Repo Notebook CI Failure Report

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      workflow_name:
        description: "Workflow name to inspect in each repository"
        required: false
        default: "Notebook CI - Scheduled"
        type: string
      lookback_days:
        description: "How many days back to search"
        required: false
        default: "7"
        type: string

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write repositories list
        run: |
          cat <<'EOF' > repos.txt
          spacetelescope/hellouniverse
          spacetelescope/mast_notebooks
          spacetelescope/jdat_notebooks
          spacetelescope/hst_notebooks
          spacetelescope/roman_notebooks
          EOF

      - name: Generate cross-repo failure report
        env:
          GH_TOKEN: ${{ secrets.ORG_ACTIONS_READ_TOKEN }}
          WORKFLOW_NAME: ${{ inputs.workflow_name || 'Notebook CI - Scheduled' }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
        run: |
          python .github/scripts/cross_repo_ci_report.py \
            --repos-file repos.txt \
            --workflow-name "$WORKFLOW_NAME" \
            --lookback-days "$LOOKBACK_DAYS" \
            --output report.md

      - name: Write report to workflow summary
        run: cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross-repo-ci-report
          path: report.md
          retention-days: 90
